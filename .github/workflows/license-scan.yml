name: License Scan

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  license:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: License Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: license